services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn example_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0

  worker:
    build: .
    command: python worker.py
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0